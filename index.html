<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue:       #2563eb;
      --blue-dark:  #1d4ed8;
      --blue-faint: #eff6ff;
      --bg:         #e8ecf2;
      --surface:    #ffffff;
      --surface-2:  #f4f6f9;
      --text:       #0f172a;
      --text-2:     #64748b;
      --text-3:     #94a3b8;
      --green:      #059669;
      --red:        #dc2626;
      --amber:      #d97706;
      --r-card:     16px;
      --r-input:    10px;
      --r-btn:      8px;
      --shadow-card: 0 1px 3px rgba(15,23,42,0.06), 0 0 0 1px rgba(15,23,42,0.05);
      --shadow-lift: 0 6px 20px rgba(15,23,42,0.09), 0 0 0 1px rgba(15,23,42,0.05);
      --shadow-focus: 0 0 0 3px rgba(37,99,235,0.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 16px 72px;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 1000px; margin: 0 auto; }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 44px 0 32px;
    }
    .header-mark {
      width: 40px; height: 40px;
      background: var(--text);
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(15,23,42,0.18);
    }
    .header-mark svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .header-text h1 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1.2;
    }
    .header-text p {
      font-size: 0.78rem;
      color: var(--text-3);
      font-weight: 400;
      margin-top: 3px;
      letter-spacing: 0.03em;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border-radius: var(--r-card);
      padding: 24px;
      box-shadow: var(--shadow-card);
      margin-bottom: 14px;
    }
    .card-title {
      font-size: 0.69rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-3);
      margin-bottom: 18px;
    }

    /* ── Settings ── */
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      align-items: start;
    }

    /* ── Main grid ── */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: start;
    }
    .main-grid > div { min-width: 0; }
    @media (max-width: 660px) { .main-grid { grid-template-columns: 1fr; } }

    /* ── Form ── */
    .form-group { margin-bottom: 18px; }
    .form-group:last-child { margin-bottom: 0; }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 8px;
      letter-spacing: 0.01em;
    }

    input[type="text"],
    input[type="password"],
    textarea {
      width: 100%;
      padding: 10px 13px;
      border: none;
      border-radius: var(--r-input);
      font-size: 0.9rem;
      color: var(--text);
      background: var(--surface-2);
      box-shadow: 0 0 0 1px rgba(15,23,42,0.09);
      transition: box-shadow 0.15s, background 0.15s;
      font-family: inherit;
      font-weight: 400;
    }
    input:focus, textarea:focus {
      outline: none;
      background: #fff;
      box-shadow: 0 0 0 1.5px var(--blue), var(--shadow-focus);
    }
    textarea { resize: vertical; min-height: 100px; line-height: 1.55; }

    /* ── API key row ── */
    .api-key-row { display: flex; gap: 7px; align-items: center; }
    .api-key-row input { flex: 1; min-width: 0; }
    .saved-badge {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--green);
      display: none;
    }
    .proxy-hint {
      font-size: 0.73rem;
      color: var(--text-3);
      margin-top: 7px;
      line-height: 1.55;
    }
    .proxy-hint code {
      background: var(--surface-2);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 0.71rem;
      box-shadow: 0 0 0 1px rgba(15,23,42,0.08);
    }

    /* ── Split generate buttons ── */
    .gen-btn-group { display: flex; gap: 8px; }
    .gen-btn-group .btn { flex: 1; }

    /* ── Optimized prompt preview ── */
    #optimizedPromptBox textarea {
      border-left: 3px solid var(--blue);
      box-shadow: 0 0 0 1px rgba(37,99,235,0.18);
      background: var(--blue-faint);
    }
    #optimizedPromptBox textarea:focus {
      background: #fff;
    }

    /* ── Upload zone ── */
    .upload-zone {
      border: 1.5px dashed rgba(15,23,42,0.13);
      border-radius: 12px;
      padding: 36px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      position: relative;
      min-height: 175px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--surface-2);
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--blue);
      background: var(--blue-faint);
      transform: translateY(-1px);
    }
    .upload-zone input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer;
      width: 100%; height: 100%;
    }
    .upload-icon { font-size: 1.75rem; line-height: 1; }
    .upload-text { font-size: 0.875rem; font-weight: 600; color: var(--text-2); }
    .upload-hint { font-size: 0.74rem; color: var(--text-3); }

    #previewImg {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border-radius: 10px;
      margin-top: 12px;
      display: none;
    }

    /* ── Slider ── */
    .slider-track {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 4px;
    }
    .slider-label { font-size: 0.74rem; color: var(--text-3); flex-shrink: 0; font-weight: 500; }
    input[type="range"] {
      flex: 1;
      height: 4px;
      accent-color: var(--blue);
      cursor: pointer;
    }

    /* ── Resolution radio ── */
    .radio-group { display: flex; gap: 8px; }
    .radio-opt { flex: 1; position: relative; }
    .radio-opt input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
    .radio-opt label {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 9px;
      background: var(--surface-2);
      box-shadow: 0 0 0 1px rgba(15,23,42,0.09);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text-2);
      transition: all 0.15s;
      margin: 0;
      user-select: none;
    }
    .radio-opt input[type="radio"]:checked + label {
      background: var(--blue-faint);
      box-shadow: 0 0 0 1.5px var(--blue);
      color: var(--blue);
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: none;
      border-radius: var(--r-btn);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s, opacity 0.15s;
      font-family: inherit;
      text-decoration: none;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }
    .btn:active:not(:disabled) { transform: scale(0.97); }

    .btn-primary {
      background: var(--blue);
      color: #fff;
      padding: 10px 18px;
      box-shadow: 0 1px 4px rgba(37,99,235,0.3);
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--blue-dark);
      box-shadow: 0 4px 14px rgba(37,99,235,0.35);
    }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-ghost {
      background: var(--surface-2);
      box-shadow: 0 0 0 1px rgba(15,23,42,0.09);
      color: var(--text-2);
      padding: 10px 14px;
    }
    .btn-ghost:hover { background: #eaedf2; }

    .btn-full { width: 100%; padding: 13px; font-size: 0.92rem; }

    /* ── Status ── */
    #statusIdle {
      color: var(--text-3);
      font-size: 0.875rem;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #statusIdle::before {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-3);
      flex-shrink: 0;
      opacity: 0.5;
    }

    .status-box { display: none; border-radius: 10px; padding: 13px 15px; }
    .status-box.pending {
      background: #fffbeb;
      box-shadow: 0 0 0 1px rgba(217,119,6,0.18), inset 3px 0 0 var(--amber);
      color: #92400e;
    }
    .status-box.error {
      background: #fef2f2;
      box-shadow: 0 0 0 1px rgba(220,38,38,0.15), inset 3px 0 0 var(--red);
      color: #991b1b;
    }
    .status-box.success {
      background: #f0fdf4;
      box-shadow: 0 0 0 1px rgba(5,150,105,0.15), inset 3px 0 0 var(--green);
      color: #065f46;
    }
    .status-row { display: flex; align-items: flex-start; gap: 10px; }
    .spinner {
      flex-shrink: 0; margin-top: 3px;
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.1);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #statusText { font-weight: 600; font-size: 0.875rem; line-height: 1.4; }
    #statusSub { font-size: 0.77rem; opacity: 0.7; margin-top: 3px; word-break: break-all; line-height: 1.4; }

    /* ── Active tasks ── */
    #activeTasksList { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .active-task {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      background: var(--text);
      border-radius: 10px;
    }
    .at-spinner {
      flex-shrink: 0; width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.18);
      border-top-color: rgba(255,255,255,0.85);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    .at-info { flex: 1; min-width: 0; }
    .at-prompt {
      font-size: 0.82rem; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: rgba(255,255,255,0.92);
    }
    .at-meta { font-size: 0.71rem; margin-top: 2px; color: rgba(255,255,255,0.38); }
    .at-elapsed {
      font-size: 0.79rem; font-weight: 600; flex-shrink: 0;
      color: rgba(255,255,255,0.5);
      font-variant-numeric: tabular-nums;
    }

    /* ── Result ── */
    #resultBox { display: none; }
    video { width: 100%; max-height: 65vh; object-fit: contain; border-radius: 10px; background: #000; display: block; }
    .video-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

    /* ── History ── */
    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .history-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 12px;
    }
    .hist-item {
      background: var(--surface-2);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      box-shadow: 0 0 0 1px rgba(15,23,42,0.07);
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .hist-item:hover {
      box-shadow: var(--shadow-lift);
      transform: translateY(-2px);
    }
    .hist-time { font-size: 0.71rem; color: var(--text-3); font-weight: 500; letter-spacing: 0.01em; }
    .hist-prompt {
      font-size: 0.85rem;
      font-weight: 400;
      line-height: 1.55;
      color: var(--text);
      max-height: 96px;
      overflow-y: auto;
    }
    .hist-tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .tag {
      font-size: 0.69rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      background: rgba(37,99,235,0.08);
      color: var(--blue);
      letter-spacing: 0.02em;
    }
    .tag.expired { background: rgba(217,119,6,0.08); color: var(--amber); }
    .hist-thumb {
      max-height: 90px;
      max-width: 100%;
      border-radius: 7px;
      display: block;
      align-self: flex-start;
    }
    .hist-actions { display: flex; gap: 6px; margin-top: 2px; flex-wrap: nowrap; }
    .hist-del {
      position: absolute; top: 12px; right: 12px;
      background: none; border: none; cursor: pointer;
      color: var(--text-3); font-size: 1rem; line-height: 1;
      padding: 3px 5px; border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .hist-del:hover { color: var(--red); background: rgba(220,38,38,0.08); }
    #histEmpty { color: var(--text-3); font-size: 0.875rem; text-align: center; padding: 28px 0; }
    .hist-inline-player {
      display: none;
      margin-top: 4px;
    }
    .hist-inline-player video {
      width: 100%; border-radius: 8px; background: #000; display: block;
    }
    .hist-inline-close {
      width: 100%; margin-top: 6px; padding: 5px;
      font-size: 0.78rem; background: none;
      border: 1px solid rgba(15,23,42,0.12); border-radius: 7px;
      cursor: pointer; color: var(--text-3);
      transition: background 0.15s, color 0.15s;
    }
    .hist-inline-close:hover { background: var(--surface-2); color: var(--text); }

    /* ── Favorites ── */
    .favs-list { display: flex; flex-direction: column; gap: 8px; }
    .fav-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      background: var(--surface-2);
      border-radius: 10px;
      box-shadow: 0 0 0 1px rgba(15,23,42,0.07);
    }
    .fav-prompt {
      flex: 1;
      font-size: 0.85rem;
      line-height: 1.55;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-all;
    }
    .fav-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
    .fav-del {
      background: none; border: none; cursor: pointer;
      color: var(--text-3); font-size: 1.1rem; line-height: 1;
      padding: 3px 5px; border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .fav-del:hover { color: var(--red); background: rgba(220,38,38,0.08); }

    /* ── Tab bar ── */
    .tab-bar-wrap {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      padding: 10px 0 6px;
      margin-bottom: 8px;
    }
    .tab-bar {
      display: flex;
      background: var(--surface);
      border-radius: var(--r-card);
      padding: 4px;
      box-shadow: var(--shadow-card);
      gap: 2px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px 8px;
      border: none;
      background: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-2);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
      min-height: 44px;
      letter-spacing: 0.01em;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn:hover:not(.active) { background: var(--surface-2); }
    .tab-btn.active { background: var(--text); color: #fff; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-mark">
      <svg viewBox="0 0 24 24">
        <polygon points="5,3 19,12 5,21"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Video Generator</h1>
      <p>Image to Video · DashScope Wan · 阿里云模型</p>
    </div>
  </header>

  <!-- Tab bar -->
  <div class="tab-bar-wrap">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="generate" onclick="showTab('generate')">生成</button>
      <button class="tab-btn" data-tab="history"  onclick="showTab('history')">历史</button>
      <button class="tab-btn" data-tab="favorites" onclick="showTab('favorites')">收藏</button>
    </div>
  </div>

  <!-- Tab: Generate -->
  <div id="tab-generate" class="tab-panel active">

  <!-- API Settings -->
  <div class="card">
    <div class="card-title">API 设置</div>
    <div class="settings-grid">
      <div class="form-group">
        <label for="apiKey">
          DashScope API Key
          <span class="saved-badge" id="savedBadge">✓ 已保存</span>
        </label>
        <div class="api-key-row">
          <input type="password" id="apiKey" placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxx"
                 autocomplete="new-password" spellcheck="false" onchange="saveApiKey()" onblur="saveApiKey()">
          <button class="btn btn-ghost" id="toggleBtn" onclick="toggleKey()">显示</button>
          <button class="btn btn-primary" onclick="saveApiKey()">保存</button>
        </div>
      </div>
      <div class="form-group">
        <label for="deepseekKey">
          DeepSeek API Key
          <span class="saved-badge" id="deepseekSavedBadge">✓ 已保存</span>
        </label>
        <div class="api-key-row">
          <input type="password" id="deepseekKey" placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxx"
                 autocomplete="new-password" spellcheck="false" onchange="saveDeepseekApiKey()" onblur="saveDeepseekApiKey()">
          <button class="btn btn-ghost" id="deepseekToggleBtn" onclick="toggleDeepseekKey()">显示</button>
          <button class="btn btn-primary" onclick="saveDeepseekApiKey()">保存</button>
        </div>
      </div>
      <div class="form-group">
        <label for="proxyUrl">
          CORS 代理 URL
          <span style="font-weight:400;color:var(--text-3)">(GitHub Pages 必填)</span>
        </label>
        <input type="text" id="proxyUrl" placeholder="https://your-worker.workers.dev"
               spellcheck="false" onchange="saveProxy()" onblur="saveProxy()">
        <div class="proxy-hint">
          将 <code>worker.js</code> 部署到 Cloudflare Workers（免费），粘贴 Worker 地址即可。
        </div>
      </div>
    </div>
  </div>

  <div class="main-grid">

    <!-- Left: upload + params -->
    <div>
      <div class="card">
        <div class="card-title">首帧图片</div>
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="imageInput" accept="image/*" onchange="handleFile(event)">
          <div class="upload-icon" id="uploadIcon">📷</div>
          <div class="upload-text" id="uploadText">点击或拖拽图片到此处</div>
          <div class="upload-hint" id="uploadHint">支持 JPG · PNG · WEBP</div>
        </div>
        <img id="previewImg" alt="图片预览">
      </div>

      <div class="card">
        <div class="card-title">生成参数</div>

        <div class="form-group">
          <label for="prompt">提示词</label>
          <textarea id="prompt" placeholder="描述视频画面，例如：人物缓缓转身，微风吹动发丝，暖阳照射，电影质感镜头…"></textarea>
          <div style="margin-top:8px;text-align:right">
            <button class="btn btn-ghost" id="optimizeBtn" onclick="runOptimize()" style="padding:7px 14px;font-size:0.8rem">✨ 提示词优化</button>
          </div>
        </div>

        <div class="form-group" id="optimizedPromptBox" style="display:none">
          <label for="optimizedPrompt">
            优化后的提示词
            <span style="font-weight:400;color:var(--blue);font-size:0.75rem">· 可编辑</span>
          </label>
          <textarea id="optimizedPrompt"></textarea>
        </div>

        <div class="form-group">
          <label for="duration">时长 &nbsp;<span style="font-weight:700;color:var(--blue)" id="durationVal">5</span><span style="font-weight:400"> 秒</span></label>
          <div class="slider-track">
            <span class="slider-label">2s</span>
            <input type="range" id="duration" min="2" max="15" value="5" step="1"
                   oninput="document.getElementById('durationVal').textContent=this.value">
            <span class="slider-label">15s</span>
          </div>
        </div>

        <div class="form-group">
          <label>分辨率</label>
          <div class="radio-group">
            <div class="radio-opt">
              <input type="radio" id="r720" name="res" value="720P" checked>
              <label for="r720">720P</label>
            </div>
            <div class="radio-opt">
              <input type="radio" id="r1080" name="res" value="1080P">
              <label for="r1080">1080P</label>
            </div>
          </div>
        </div>

        <div id="genBtnArea">

const API_BASE   = `${API_ORIGIN}/api/v1`;

function apiUrl(path) {
  const proxy = localStorage.getItem(PROXY_KEY) || '';

}
const NEG_PROMPT = 'deformed face, distorted face, disfigured, bad anatomy, multiple faces, face mutation, asymmetrical face, different person, identity change, inconsistent face, morphing face, lip sync mismatch, out of sync lips, mouth not matching audio, closed mouth while speaking, mouth not moving, frozen mouth, incorrect mouth shape, exaggerated mouth movement, distorted mouth, mumbling mouth, mouth shape mismatch, unnatural expression, stiff expression, frozen expression, dead eyes, robotic expression, lifeless face, blank stare, vacant expression, forced smile, expressionless, stiff movement, robotic motion, jerky motion, unnatural pose, rigid body, frozen body, mannequin-like, puppet-like movement, floating limbs, disconnected limbs, unnatural gait, abrupt motion, choppy animation, low frame rate motion, flickering, temporal inconsistency, frame jitter, motion blur artifacts, inconsistent lighting, identity drift, morphing between frames, ghosting, motion artifacts, frame skipping, worst quality, low quality, blurry, low resolution, artifacts, noise';

function persistActiveTasks() {

function resumeActiveTasks() {
  let saved;

  catch { localStorage.removeItem(ACTIVE_KEY); return; }
  for (const t of saved) {

/* ── Image ── */
function setupDrag() {
  const zone = document.getElementById('uploadZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) readFile(f);
  });
}

function handleFile(e) {
  const f = e.target.files[0];
  if (f) readFile(f);
}

function readFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    imgBase64 = e.target.result;
    document.getElementById('previewImg').src = imgBase64;
    document.getElementById('previewImg').style.display = 'block';
    const sizeStr = file.size > 1048576
      ? (file.size / 1048576).toFixed(1) + ' MB'
      : Math.round(file.size / 1024) + ' KB';
    const dim = new Image();
    dim.onload = () => {
      imgWidth  = dim.naturalWidth;
      imgHeight = dim.naturalHeight;
      const ok  = imgWidth >= 240 && imgHeight >= 240;
      document.getElementById('uploadIcon').textContent = ok ? '✅' : '⚠️';
      document.getElementById('uploadText').textContent = file.name;
      document.getElementById('uploadHint').textContent = ok
        ? `${imgWidth} × ${imgHeight} · ${sizeStr}`
        : `⚠️ ${imgWidth} × ${imgHeight} — 宽高均需 ≥ 240px`;
    };
    dim.src = imgBase64;
  };
  reader.readAsDataURL(file);
}

/* ── Status helpers ── */
function showStatusBox(type, text, sub) {
  document.getElementById('statusIdle').style.display = 'none';
  const box = document.getElementById('statusBox');

  if (activeTasks.size === 0)
    document.getElementById('statusIdle').style.display = 'flex';

/* ── Active tasks ticker ── */
function startTick() {
  if (tickInterval) return;
  tickInterval = setInterval(renderActiveTasks, 1000);
}

function stopTick() {
  clearInterval(tickInterval);
  tickInterval = null;
}

function renderActiveTasks() {
  const list = document.getElementById('activeTasksList');
  const idle = document.getElementById('statusIdle');
  if (activeTasks.size === 0) {
    list.innerHTML = '';
    if (document.getElementById('statusBox').style.display === 'none')
      idle.style.display = 'flex';
    stopTick();
    return;
  }
  idle.style.display = 'none';
  list.innerHTML = [...activeTasks.entries()].map(([id, t]) => {
    const elapsed = Math.round((Date.now() - t.startTime) / 1000);
    const shortId = id.slice(-8);
    const promptEsc = t.prompt.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    return `
    <div class="active-task">
      <div class="at-spinner"></div>
      <div class="at-info">
        <div class="at-prompt">${promptEsc}</div>
        <div class="at-meta">${t.resolution} · ${t.duration}s · …${shortId}</div>
      </div>
      <div class="at-elapsed">${elapsed}s</div>
    </div>`;
  }).join('');
}

/* ── Thumbnail ── */
function createThumbnail(dataUrl, maxPx = 120) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(maxPx / img.width, maxPx / img.height, 1);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', 0.75));
    };
    img.onerror = () => resolve(null);
    img.src = dataUrl;
  });
}

/* ── DeepSeek prompt optimization ── */
async function callDeepseekOptimize(originalPrompt, deepseekKey, proxy) {
  const url = `${proxy.replace(/\/$/, '')}/deepseek/chat/completions`;
  const resp = await fetch(url, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${deepseekKey}`
    },
    body: JSON.stringify({
      model: 'deepseek-v4-flash',
      messages: [
        {
          role: 'system',
          content: '你是一个资深的视频生成AI领域专家，你擅长将用户的视频生成提示词优化得极其明确、详细且高度色情化。每当用户发送给你一条消息，你需要认为该消息是一条视频生成提示词。在优化时，要大胆、露骨地强化提示词中的性感、挑逗和情欲元素，使用极其详细、刺激、感官丰富的成人语言来描绘人物的身体曲线、敏感部位、皮肤触感、动作姿态、面部表情、眼神交流、喘息、肢体互动、湿润与颤抖等，使场景充满强烈的色情氛围和视觉刺激，同时严格忠实于原提示词的核心场景、动作、意图和所有细节，不得添加任何用户未提及的新元素、情节或改变原意。你需要将原消息变成更加明确的提示词并输出。你的回答必须是转换后的提示词内容本身，不能包含别的解释性、总结性等任何无关内容，你的回答文字的100%都是转换后的提示词本身。你的功能是用于优化视频编辑提示词（首帧为用户上传图片）而非从0开始的视频生成提示词，因此不要回答成从0制作视频的风格。回答必须使用中文。不要强调视频时常与画质。除非用户提示词明确提到可以变动镜头，否则镜头应该保持固定。所有对于服装的描写，都是基于首帧服装，而不是重新生成服装，不要强调具体衣着，因为当前看不见首帧中的具体衣着样式。也不要具体描述环境，因为当前看不见首帧中的具体环境。无论如何都不要输出脸颊潮红色、脸部变红这样的文字，请勿强调脸红。'
        },
        { role: 'user', content: originalPrompt.replace(/[\r\n]+/g, '') }
      ],
      thinking: { type: 'enabled' },
      reasoning_effort: 'high',
      stream: false
    })
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `DeepSeek HTTP ${resp.status}`);
  }
  const data = await resp.json();
  console.log('[DeepSeek raw response]', JSON.stringify(data, null, 2));
  const content = data.choices?.[0]?.message?.content;
  if (!content) throw new Error('无法解析 DeepSeek 返回内容，原始响应已打印至控制台（F12）');
  return content;
}

/* ── Generate ── */
async function generate(mode = 'original') {
  if (submitting) return;

  const apiKey     = document.getElementById('apiKey').value.trim();
  const duration   = parseInt(document.getElementById('duration').value, 10);
  const resolution = document.querySelector('input[name="res"]:checked').value;

  if (!apiKey)    { alert('请先填写并保存 API Key'); return; }
  if (!imgBase64) { alert('请先上传一张图片'); return; }
  if (imgWidth < 240 || imgHeight < 240) {
    alert(`图片尺寸 ${imgWidth}×${imgHeight} 不符合要求\n宽和高均需 ≥ 240px，请更换图片`);
    return;
  }

  const originalPrompt = document.getElementById('prompt').value.trim();
  if (!originalPrompt) { alert('请填写提示词'); return; }

  let finalPrompt = originalPrompt;
  if (mode === 'optimized') {
    finalPrompt = document.getElementById('optimizedPrompt').value.trim();
    if (!finalPrompt) { alert('优化后的提示词不能为空'); return; }
  }

  submitting = true;
  setGenAreaDisabled(true);
  showStatusBox('pending', '正在提交任务…', '连接 DashScope 服务器');

  const body = {
    model: 'wan2.7-i2v-2026-04-25',
    input: {
      prompt: finalPrompt,
      media: [{ type: 'first_frame', url: imgBase64 }],
      'negative_prompt ': NEG_PROMPT
    },
    parameters: { resolution, duration, prompt_extend: true, watermark: false }
  };

  try {
    const resp = await fetch(apiUrl('/services/aigc/video-generation/video-synthesis'), {
      method: 'POST',
      headers: {
        'X-DashScope-Async': 'enable',
        'Authorization': `Bearer ${apiKey}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    const data = await resp.json();

    if (!resp.ok || !data.output?.task_id) {
      const code = data.code || `HTTP ${resp.status}`;
      const msg  = data.message || '未知错误';
      const hint = /overdue|standing|payment/i.test(msg)
        ? '阿里云账号欠费或受限，请登录控制台处理'
        : /invalid.*key|unauthorized/i.test(msg) || resp.status === 401
          ? '请检查 API Key 是否正确'
          : '请查看上方错误信息';
      showStatusBox('error', `[${code}] ${msg}`, hint);
      submitting = false;
      setGenAreaDisabled(false);
      return;
    }

    const taskId = data.output.task_id;
    const thumb = imgBase64 ? await createThumbnail(imgBase64) : null;
    activeTasks.set(taskId, { prompt: finalPrompt, resolution, duration, startTime: Date.now(), apiKey, thumb });
    persistActiveTasks();

    submitting = false;
    setGenAreaDisabled(false);
    clearStatusBox();
    startTick();
    renderActiveTasks();
    poll(taskId);

  } catch (err) {
    const isCors = err instanceof TypeError && err.message.toLowerCase().includes('fetch');
    showStatusBox('error',
      isCors ? '请求被浏览器拦截（CORS）' : '网络错误：' + err.message,
      isCors ? '请在浏览器控制台查看详细错误' : '请检查网络连接');
    submitting = false;
    setGenAreaDisabled(false);
  }
}

function poll(taskId) {
  const task = activeTasks.get(taskId);
  if (!task) return;

  fetch(apiUrl(`/tasks/${taskId}`), {
    headers: { 'Authorization': `Bearer ${task.apiKey}` }
  })
  .then(r => r.json())
  .then(data => {
    const status  = data.output?.task_status;
    const elapsed = Math.round((Date.now() - task.startTime) / 1000);

    if (status === 'SUCCEEDED') {
      const url = data.output.video_url;
      activeTasks.delete(taskId);
      persistActiveTasks();
      renderActiveTasks();
      saveHistory({ taskId, url, elapsed, prompt: task.prompt, resolution: task.resolution, duration: task.duration, thumb: task.thumb || null });
      showTab('generate');
      document.getElementById('resultVideo').src = url;
      document.getElementById('resultBox').style.display = 'block';
      document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth' });
    } else if (status === 'FAILED') {
      activeTasks.delete(taskId);
      persistActiveTasks();
      renderActiveTasks();
      showStatusBox('error', '生成失败', data.output?.message || '任务执行出错，请重试');
    } else {
      setTimeout(() => poll(taskId), 5000);
    }
  })
  .catch(() => {
    setTimeout(() => poll(taskId), 5000);
  });
}

/* ── Download / Share ── */
async function saveVideo(btn, url, filename) {
  const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
  if (isMobile && navigator.share) {
    const orig = btn.textContent;
    btn.textContent = '加载中…';
    btn.disabled = true;
    try {
      const resp = await fetch(url);
      const blob = await resp.blob();
      const file = new File([blob], filename, { type: blob.type || 'video/mp4' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file] });
        btn.textContent = orig;
        btn.disabled = false;
        return;
      }
    } catch (_) { /* fall through */ }
    btn.textContent = orig;
    btn.disabled = false;
  }
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

/* ── Copy prompt ── */
function copyPromptFromBtn(btn) {
  const prompt = btn.dataset.prompt;
  (navigator.clipboard ? navigator.clipboard.writeText(prompt) : Promise.reject())
    .catch(() => {
      const ta = document.createElement('textarea');
      ta.value = prompt;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    })
    .finally(() => {
      const orig = btn.textContent;
      btn.textContent = '✓ 已复制';
      setTimeout(() => { btn.textContent = orig; }, 1500);
    });
}

/* ── History ── */
function saveHistory({ taskId, url, elapsed, prompt, resolution, duration, thumb }) {
  const list = getHistList();
  list.unshift({ id: Date.now(), timestamp: Date.now(), prompt, resolution, duration, url, elapsed, taskId, thumb: thumb || null });
  if (list.length > HIST_MAX) list.length = HIST_MAX;
  localStorage.setItem(HIST_KEY, JSON.stringify(list));
  renderHistory();
}

function getHistList() {
  try { return JSON.parse(localStorage.getItem(HIST_KEY)) || []; }
  catch { return []; }
}

function deleteHistItem(id) {
  const list = getHistList().filter(i => i.id !== id);
  localStorage.setItem(HIST_KEY, JSON.stringify(list));
  renderHistory();
}

function clearHistory() {
  if (!confirm('确认清空所有历史记录？')) return;
  localStorage.removeItem(HIST_KEY);
  renderHistory();
}

function playFromHistory(id, url) {
  // Close all other inline players
  document.querySelectorAll('.hist-inline-player').forEach(p => {
    if (p.dataset.histId !== String(id)) {
      p.style.display = 'none';
      const v = p.querySelector('video');
      if (v) { v.pause(); v.src = ''; }
    }
  });

  const player = document.getElementById('hist-player-' + id);
  if (!player) return;

  if (player.style.display === 'block') {
    player.style.display = 'none';
    const v = player.querySelector('video');
    if (v) { v.pause(); v.src = ''; }
  } else {
    const v = player.querySelector('video');
    v.src = url;
    player.style.display = 'block';
    v.play().catch(() => {});
    player.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function showTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => {
    p.style.display = 'none'; p.classList.remove('active');
  });
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const panel = document.getElementById('tab-' + name);
  panel.style.display = 'block'; panel.classList.add('active');
  document.querySelector(`.tab-btn[data-tab="${name}"]`).classList.add('active');
  if (name === 'favorites') setFavsOpen(true);
}

function renderHistory() {
  const list  = getHistList();
  const grid  = document.getElementById('historyGrid');
  const empty = document.getElementById('histEmpty');

  empty.style.display = list.length ? 'none' : 'block';
  if (!list.length) { grid.innerHTML = ''; return; }
  grid.innerHTML = list.map(item => {
    const d = new Date(item.timestamp);
    const timeStr = d.toLocaleDateString('zh-CN') + ' ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    const expired = (Date.now() - item.timestamp) > URL_TTL;
    const promptEsc = item.prompt.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    return `
    <div class="hist-item">
      <button class="hist-del" title="删除" onclick="deleteHistItem(${item.id})">×</button>
      <div class="hist-time">${timeStr} · 耗时 ${item.elapsed}s</div>
      ${item.thumb ? `<img class="hist-thumb" src="${item.thumb}" alt="首帧缩略图">` : ''}
      <div class="hist-prompt">${promptEsc}</div>
      <div class="hist-tags">
        <span class="tag">${item.resolution}</span>
        <span class="tag">${item.duration}s</span>
        ${expired ? '<span class="tag expired">链接可能已过期</span>' : ''}
      </div>
      <div class="hist-inline-player" id="hist-player-${item.id}" data-hist-id="${item.id}">
        <video controls playsinline></video>
        <button class="hist-inline-close" onclick="playFromHistory(${item.id}, '${item.url}')">▲ 收起</button>
      </div>
      <div class="hist-actions">
        <button class="btn btn-primary" style="padding:7px 14px;font-size:0.8rem"
          onclick="playFromHistory(${item.id}, '${item.url}')">▶ 播放</button>
        <button class="btn btn-ghost" style="padding:7px 14px;font-size:0.8rem"
          onclick="saveVideo(this,'${item.url}','ai_video_${item.id}.mp4')">↓ 下载</button>
        <button class="btn btn-ghost" style="padding:7px 14px;font-size:0.8rem"
          data-prompt="${promptEsc}" onclick="copyPromptFromBtn(this)">复制</button>
        <button class="btn btn-ghost" style="padding:7px 14px;font-size:0.8rem"
          data-prompt="${promptEsc}" onclick="favFromBtn(this)">☆ 收藏</button>
      </div>
    </div>`;
  }).join('');
}
/* ── Favorites ── */
function getFavList() {
  try { return JSON.parse(localStorage.getItem(FAVS_KEY)) || []; }
  catch { return []; }
}

function saveFavorite(prompt) {
  const list = getFavList();
  if (list.some(f => f.prompt === prompt)) return false;
  list.unshift({ id: Date.now(), prompt, timestamp: Date.now() });
  localStorage.setItem(FAVS_KEY, JSON.stringify(list));
  renderFavorites();
  setFavsOpen(true);
  return true;
}

function deleteFavorite(id) {
  const list = getFavList().filter(f => f.id !== id);
  localStorage.setItem(FAVS_KEY, JSON.stringify(list));
  renderFavorites();
}

function clearFavorites() {
  if (!confirm('确认清空所有收藏的提示词？')) return;
  localStorage.removeItem(FAVS_KEY);
  renderFavorites();
}

function setFavsOpen(open) {
  const list    = document.getElementById('favoritesList');
  const chevron = document.getElementById('favsChevron');
  if (!list) return;
  list.style.display = open ? 'flex' : 'none';
  chevron.style.transform = open ? '' : 'rotate(-90deg)';
}

function toggleFavorites() {
  const list = document.getElementById('favoritesList');
  setFavsOpen(list.style.display === 'none');
}

function favFromBtn(btn) {
  const prompt = btn.dataset.prompt;
  const saved = saveFavorite(prompt);
  const orig = btn.textContent;
  btn.textContent = saved ? '★ 已收藏' : '已存在';
  if (saved) btn.style.color = 'var(--amber)';
  setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
}

function renderFavorites() {
  const list   = getFavList();
  const listEl = document.getElementById('favoritesList');
  const emptyEl = document.getElementById('favEmpty');

  if (emptyEl) emptyEl.style.display = list.length ? 'none' : 'block';
  if (!list.length) { listEl.style.display = 'none'; return; }

  listEl.innerHTML = list.map(item => {
    const promptEsc = item.prompt
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    return `
    <div class="fav-item">
      <div class="fav-prompt">${promptEsc}</div>
      <div class="fav-actions">
        <button class="btn btn-ghost" style="padding:6px 12px;font-size:0.78rem"
          data-prompt="${promptEsc}" onclick="copyPromptFromBtn(this)">复制</button>
        <button class="fav-del" onclick="deleteFavorite(${item.id})" title="删除">×</button>
      </div>
    </div>`;
  }).join('');
}
</script>
